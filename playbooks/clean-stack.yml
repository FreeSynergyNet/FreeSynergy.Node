---
# clean-stack.yml – Remove orphaned resources across all project hosts

- name: "FreeSynergy.Node – Clean Stack"
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: true

  vars:
    project_file: "{{ project_config }}"
    fsn_root: "{{ playbook_dir | dirname }}"

  tasks:
    - name: "Read project file"
      ansible.builtin.include_vars:
        file: "{{ project_file }}"
        name: project_cfg

    - name: "Set project variables"
      ansible.builtin.set_fact:
        project_name: "{{ project_cfg.project.name }}"
        project_root: "{{ fsn_root }}/projects/{{ project_cfg.project.name }}"
        desired_services: "{{ project_cfg.load.modules | dict2items | map(attribute='key') | list }}"

    - name: "Find deployed services"
      ansible.builtin.find:
        paths: "{{ project_root }}/configs"
        file_type: directory
      register: deployed_dirs

    - name: "Identify orphaned services"
      ansible.builtin.set_fact:
        orphaned_services: "{{ deployed_dirs.files | map(attribute='path') | map('basename') | difference(desired_services) | list }}"

    - name: "Report orphaned services"
      when: orphaned_services | length > 0
      ansible.builtin.debug:
        msg: "Orphaned services found: {{ orphaned_services | join(', ') }}"

    - name: "Clean orphaned services"
      when: orphaned_services | length > 0
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/clean-module.yml"
      loop: "{{ orphaned_services }}"
      loop_control:
        loop_var: orphan_name

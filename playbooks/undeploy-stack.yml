---
# undeploy-stack.yml – Run undeploy hooks then stop all services

- name: "FreeSynergy.Node – Undeploy Stack"
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: true

  vars:
    project_file: "{{ project_config }}"
    fsn_root: "{{ playbook_dir | dirname }}"

  tasks:
    - name: "Read project file"
      ansible.builtin.include_vars:
        file: "{{ project_file }}"
        name: project_cfg

    - name: "Set project variables"
      ansible.builtin.set_fact:
        project_name: "{{ project_cfg.project.name }}"
        project_domain: "{{ project_cfg.project.domain }}"
        project_root: "{{ fsn_root }}/projects/{{ project_cfg.project.name }}"

    - name: "Run undeploy hooks then stop each module"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/undeploy-module.yml"
      loop: "{{ project_cfg.load.modules | dict2items | reverse | list }}"
      loop_control:
        loop_var: module_entry
        label: "{{ module_entry.key }}"

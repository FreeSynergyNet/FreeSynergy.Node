---
# remove-stack.yml – Remove hooks + delete everything

- name: "FreeSynergy.Node – Remove Stack"
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: true

  vars:
    project_file: "{{ project_config }}"
    fsn_root: "{{ playbook_dir | dirname }}"

  tasks:
    - name: "Read project file"
      ansible.builtin.include_vars:
        file: "{{ project_file }}"
        name: project_cfg

    - name: "Set project variables"
      ansible.builtin.set_fact:
        project_name: "{{ project_cfg.project.name }}"
        project_root: "{{ fsn_root }}/projects/{{ project_cfg.project.name }}"

    - name: "Confirm removal"
      ansible.builtin.pause:
        prompt: "This will REMOVE all services and data for {{ project_name }}. Type 'yes' to confirm"
      register: confirm
      when: not (force_remove | default(false))

    - name: "Abort if not confirmed"
      ansible.builtin.fail:
        msg: "Removal cancelled"
      when: not (force_remove | default(false)) and confirm.user_input != 'yes'

    - name: "Run remove hooks then delete each module"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/remove-module.yml"
      loop: "{{ project_cfg.load.modules | dict2items | reverse | list }}"
      loop_control:
        loop_var: module_entry
        label: "{{ module_entry.key }}"

---
# setup-server.yml – Prepare a running server for FreeSynergy.Node
# Prerequisite: OS installed, SSH works

- name: "FreeSynergy.Node – Server Setup"
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: true
  become: true

  vars:
    fsn_user: "{{ deploy_user | default('fsn') }}"
    fsn_min_podman: "5.0"

  tasks:
    - name: "Check Podman installation"
      ansible.builtin.command: podman --version
      register: podman_check
      failed_when: false
      changed_when: false

    - name: "Parse Podman version"
      when: podman_check.rc == 0
      ansible.builtin.set_fact:
        podman_version: "{{ podman_check.stdout | regex_search('[0-9]+\\.[0-9]+') }}"

    - name: "Fail if Podman version too old"
      when: podman_check.rc == 0 and podman_version is version(fsn_min_podman, '<')
      ansible.builtin.fail:
        msg: "Podman {{ podman_version }} is too old. Minimum required: {{ fsn_min_podman }}"

    - name: "Install Podman if missing"
      when: podman_check.rc != 0
      block:
        - name: "Install Podman (Debian/Ubuntu)"
          when: ansible_os_family == 'Debian'
          ansible.builtin.apt:
            name: podman
            state: present
            update_cache: true

        - name: "Install Podman (RedHat/Fedora)"
          when: ansible_os_family == 'RedHat'
          ansible.builtin.dnf:
            name: podman
            state: present

        - name: "Install Podman (Archlinux)"
          when: ansible_os_family == 'Archlinux'
          community.general.pacman:
            name: podman
            state: present

    - name: "Set unprivileged port start to 80"
      ansible.posix.sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: "80"
        sysctl_file: /etc/sysctl.d/99-fsn-unprivileged-ports.conf
        reload: true
        state: present

    - name: "Check if deploy user exists"
      ansible.builtin.getent:
        database: passwd
        key: "{{ fsn_user }}"
      register: user_check
      failed_when: false

    - name: "Create deploy user"
      when: user_check.rc != 0
      ansible.builtin.user:
        name: "{{ fsn_user }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: "Enable linger for deploy user"
      ansible.builtin.command:
        cmd: "loginctl enable-linger {{ fsn_user }}"
      changed_when: true

    - name: "Server setup complete"
      ansible.builtin.debug:
        msg: >
          Server is ready for FreeSynergy.Node.
          Deploy user: {{ fsn_user }}
          Podman: {{ podman_version | default('just installed') }}
          Unprivileged ports: enabled (from port 80)

---
# sync-stack.yml – Compare desired vs actual state across all hosts (read-only)
# No changes are made. Reports: missing, diverged, extra, ok.

- name: "FreeSynergy.Node – Sync Stack (read-only)"
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: true

  vars:
    project_file: "{{ project_config }}"
    fsn_root: "{{ playbook_dir | dirname }}"

  tasks:
    - name: "Read project file"
      ansible.builtin.include_vars:
        file: "{{ project_file }}"
        name: project_cfg

    - name: "Read all project files for this host"
      ansible.builtin.find:
        paths: "{{ fsn_root }}/projects/{{ project_cfg.project.name }}"
        patterns: "*.project.yml"
      register: project_files

    - name: "Load all project configs"
      ansible.builtin.include_vars:
        file: "{{ item.path }}"
        name: "project_{{ item.path | basename | regex_replace('.yml$', '') }}"
      loop: "{{ project_files.files }}"

    - name: "Collect desired modules"
      ansible.builtin.set_fact:
        desired_modules: "{{ project_cfg.load.modules | dict2items }}"

    - name: "Check for duplicate service names"
      ansible.builtin.assert:
        that:
          - desired_modules | map(attribute='key') | list | length ==
            desired_modules | map(attribute='key') | list | unique | length
        fail_msg: "Duplicate service names detected in project {{ project_cfg.project.name }}"

    - name: "Read deployed state for each module"
      ansible.builtin.stat:
        path: "{{ fsn_root }}/projects/{{ project_cfg.project.name }}/configs/{{ item.key }}/.deployed"
      register: deployed_states
      loop: "{{ desired_modules }}"

    - name: "Compare desired vs actual state"
      ansible.builtin.debug:
        msg: >
          Module: {{ item.item.key }}
          Class: {{ item.item.value.module_class }}
          Status: {{ 'DEPLOYED' if item.stat.exists else 'MISSING' }}
      loop: "{{ deployed_states.results }}"
      loop_control:
        label: "{{ item.item.key }}"

    - name: "Check module constraints"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/check-constraints.yml"
      loop: "{{ desired_modules }}"
      loop_control:
        loop_var: module_entry

---
# fetch-modules.yml – Download / update module code via git
#
# Reads the project file and processes each module in load.modules:
#   - If 'source' is defined in the module entry → git clone / pull
#   - If 'source' is absent         → module is bundled; verify it exists
#
# External module syntax in the project file:
#
#   load:
#     modules:
#       "my-service":
#         module_class: "category/name"
#         source: "https://github.com/user/module-name"   # enables git fetch
#         source_version: "v1.2.0"                         # tag or branch (optional)
#
# Also called by update-stack.yml to pull the latest code for external modules.

- name: "FreeSynergy.Node – Fetch Modules"
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: false

  vars:
    project_file: "{{ project_config }}"
    fsn_root: "{{ playbook_dir | dirname }}"

  tasks:
    - name: "Read project file"
      ansible.builtin.include_vars:
        file: "{{ project_file }}"
        name: project_cfg

    - name: "Set module list"
      ansible.builtin.set_fact:
        module_list: "{{ project_cfg.load.modules | dict2items }}"

    # --- External modules: git clone / pull ---

    - name: "Clone or update external module"
      ansible.builtin.git:
        repo: "{{ item.value.source }}"
        dest: "{{ fsn_root }}/modules/{{ item.value.module_class }}"
        version: "{{ item.value.source_version | default('HEAD') }}"
        update: true
        force: false
      when:
        - item.value.source is defined
        - item.value.source | length > 0
      loop: "{{ module_list }}"
      loop_control:
        label: "{{ item.key }} ({{ item.value.module_class }})"

    # --- Bundled modules: verify they are present ---

    - name: "Check bundled module directory"
      ansible.builtin.stat:
        path: "{{ fsn_root }}/modules/{{ item.value.module_class }}"
      register: module_stat
      when:
        - item.value.source is not defined or item.value.source | length == 0
      loop: "{{ module_list }}"
      loop_control:
        label: "{{ item.key }} ({{ item.value.module_class }})"

    - name: "Fail if bundled module directory is missing"
      ansible.builtin.assert:
        that:
          - item.stat.isdir is defined
          - item.stat.isdir
        fail_msg: >-
          Module '{{ item.item.key }}' not found at
          {{ fsn_root }}/modules/{{ item.item.value.module_class }}.
          Either add 'source: <git-url>' to the module entry in your project file,
          or ensure the platform repo includes this module.
      when: not (item.skipped | default(false))
      loop: "{{ module_stat.results | default([]) }}"
      loop_control:
        label: "{{ item.item.key }}"

    - name: "All modules verified"
      ansible.builtin.debug:
        msg: >-
          {{ module_list | length }} module(s) checked.
          External (git): {{ module_list | selectattr('value.source', 'defined') | list | length }}.
          Bundled: {{ module_list | rejectattr('value.source', 'defined') | list | length }}.

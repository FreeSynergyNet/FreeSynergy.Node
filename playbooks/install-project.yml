---
# install-project.yml – Setup a new project and generate config examples

- name: "FreeSynergy.Node – Install Project"
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: true

  vars:
    project_file: "{{ project_config }}"
    fsn_root: "{{ playbook_dir | dirname }}"

  tasks:
    - name: "Read project file"
      ansible.builtin.include_vars:
        file: "{{ project_file }}"
        name: project_cfg

    - name: "Set project variables"
      ansible.builtin.set_fact:
        project_name: "{{ project_cfg.project.name }}"
        project_root: "{{ fsn_root }}/projects/{{ project_cfg.project.name }}"

    - name: "Create project directories"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ project_root }}/configs"
        - "{{ project_root }}/data"
        - "{{ project_root }}/branding"

    - name: "Generate config examples for each module"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/generate-single-example.yml"
      loop: "{{ project_cfg.load.modules | dict2items }}"
      loop_control:
        loop_var: module_entry
        label: "{{ module_entry.key }}"
      vars:
        instance_name: "{{ module_entry.key }}"
        module_path: "{{ fsn_root }}/modules/{{ module_entry.value.module_class }}"

    - name: "Project installed successfully: {{ project_name }}"
      ansible.builtin.debug:
        msg: >
          Project directory created at {{ project_root }}.
          Config examples generated in configs/.
          Please fill in the config values and run deploy-stack.yml.

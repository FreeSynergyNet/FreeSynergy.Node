---
# dns-cleanup-module.yml – Remove all DNS records for a module via the state file
#
# Variables:
#   dns_state_file    - Absolute path to .dns-managed.yml
#   dns_cleanup_module - Module class whose records to delete (e.g. "proxy/zentinel")
#   dns_provider      - Provider plugin: "hetzner" | "cloudflare"
#   dns_api_token     - API token for the DNS provider
#
# Reads the state file, removes all DNS records belonging to dns_cleanup_module
# from the provider and from the state file. Used for module remove/rename cleanup.
# Idempotent: 404 from provider is treated as success.

- name: "DNS cleanup: load state file"
  ansible.builtin.slurp:
    src: "{{ dns_state_file }}"
  register: _cleanup_raw
  failed_when: false

- name: "DNS cleanup: parse all records"
  ansible.builtin.set_fact:
    _cleanup_all: >-
      {{ (_cleanup_raw.content | default('') | b64decode | from_yaml | default({})).get('records', []) }}

- name: "DNS cleanup: find records for module"
  ansible.builtin.set_fact:
    _cleanup_targets: >-
      {{ _cleanup_all | selectattr('module', 'equalto', dns_cleanup_module) | list }}

- name: "DNS cleanup: nothing to remove"
  ansible.builtin.debug:
    msg: "No DNS records found in state file for module '{{ dns_cleanup_module }}'."
  when: _cleanup_targets | length == 0

# ── Hetzner DNS ────────────────────────────────────────────────────────────────

- name: "Hetzner: delete record by ID"
  ansible.builtin.uri:
    url: "https://dns.hetzner.com/api/v1/records/{{ stale.record_id }}"
    method: DELETE
    headers:
      Auth-Api-Token: "{{ dns_api_token }}"
    status_code: [200, 204, 404]
  loop: "{{ _cleanup_targets }}"
  loop_control:
    loop_var: stale
    label: "{{ stale.type }} {{ stale.fqdn }}"
  when:
    - dns_provider == "hetzner"
    - _cleanup_targets | length > 0

# ── Cloudflare DNS (planned) ───────────────────────────────────────────────────

- name: "Cloudflare DNS not yet implemented"
  ansible.builtin.fail:
    msg: >-
      DNS provider 'cloudflare' is not yet implemented.
      Contribution welcome: playbooks/tasks/dns-cleanup-module.yml
  when: dns_provider == "cloudflare"

# ── State file update ──────────────────────────────────────────────────────────

- name: "DNS cleanup: remove module records from state file"
  ansible.builtin.copy:
    content: >-
      {{ {'records': _cleanup_all | rejectattr('module', 'equalto', dns_cleanup_module) | list}
         | to_nice_yaml }}
    dest: "{{ dns_state_file }}"
    mode: "0600"
  when: _cleanup_targets | length > 0

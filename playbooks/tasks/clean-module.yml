---
# Task: Clean an orphaned module

- name: "Run clean hooks for {{ orphan_name }}"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/run-module-hooks.yml"
  vars:
    instance_name: "{{ orphan_name }}"
    hook_phase: "clean"
  failed_when: false

- name: "Stop orphaned service {{ orphan_name }}"
  ansible.builtin.systemd:
    name: "{{ orphan_name }}.service"
    state: stopped
    enabled: false
    scope: user
  failed_when: false

- name: "Remove Quadlet file for {{ orphan_name }}"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/containers/systemd/{{ orphan_name }}.container"
    state: absent

- name: "Remove env file for {{ orphan_name }}"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/containers/systemd/{{ orphan_name }}.env"
    state: absent

- name: "Reload systemd"
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

---
# Task: Record the deployed version of a module instance
# After successful deploy, write the module version to instance config

- name: "Ensure config directory exists for {{ instance_name }}"
  ansible.builtin.file:
    path: "{{ project_root }}/configs/{{ instance_name }}"
    state: directory
    mode: "0755"

- name: "Record deployed version for {{ instance_name }}"
  ansible.builtin.copy:
    content: |
      # Auto-generated – do not edit
      deployed_version: "{{ module.version }}"
      deployed_at: "{{ ansible_date_time.iso8601 }}"
      module_class: "{{ module.type }}/{{ module.name }}"
    dest: "{{ project_root }}/configs/{{ instance_name }}/.deployed"
    mode: "0644"

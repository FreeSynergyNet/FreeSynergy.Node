---
# Task: Restart a single module instance

- name: "Set module variables for {{ module_entry.key }}"
  ansible.builtin.set_fact:
    instance_name: "{{ module_entry.key }}"
    module_path: "{{ fsn_root }}/modules/{{ module_entry.value.module_class }}"

- name: "Restart service {{ instance_name }}"
  ansible.builtin.systemd:
    name: "{{ instance_name }}.service"
    state: restarted
    scope: user

- name: "Run restart hooks"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/run-module-hooks.yml"
  vars:
    hook_phase: "restart"

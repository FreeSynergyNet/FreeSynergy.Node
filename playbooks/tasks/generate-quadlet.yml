---
# Task: Generate a Quadlet file for a single module instance

- name: "Ensure Quadlet directory exists"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/containers/systemd"
    state: directory
    mode: "0755"

- name: "Generate Quadlet file for {{ instance_name }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/container.quadlet.j2"
    dest: "{{ ansible_user_dir }}/.config/containers/systemd/{{ instance_name }}.container"
    mode: "0644"
  register: quadlet_changed

- name: "Generate environment file for {{ instance_name }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/container.env.j2"
    dest: "{{ ansible_user_dir }}/.config/containers/systemd/{{ instance_name }}.env"
    mode: "0600"
  register: env_changed

- name: "Reload systemd daemon"
  when: quadlet_changed.changed or env_changed.changed
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

---
# dns-create-record.yml – Create a DNS record via the configured provider
#
# Variables:
#   record_type    - A, AAAA, CNAME, MX, TXT, SRV
#   record_name    - Full DNS name (e.g. "mail.freesynergy.net", "freesynergy.net" for root)
#   record_value   - Record value (IP, FQDN, text content, priority+target for MX/SRV)
#   dns_zone       - Root zone (e.g. "freesynergy.net") – used to derive relative name
#   dns_provider   - Provider plugin: "hetzner" | "cloudflare"
#   dns_api_token  - API token (vault_hetzner_dns_token or vault_cloudflare_api_token)
#   dns_ttl        - TTL in seconds (optional, default: 300)
#   dns_state_file - Absolute path to .dns-managed.yml (optional, enables state tracking)
#   dns_state_module - Module class that owns this record, e.g. "proxy/zentinel" (optional)
#
# Idempotent: skips creation if a record with the same type and name already exists.

- name: "Derive relative record name"
  ansible.builtin.set_fact:
    _dns_relative: >-
      {{ (record_name == dns_zone)
         | ternary('@', record_name | regex_replace('\.' + dns_zone + '$', '')) }}

# ── Hetzner DNS ────────────────────────────────────────────────────────────────

- name: "Hetzner: look up zone {{ dns_zone }}"
  ansible.builtin.uri:
    url: "https://dns.hetzner.com/api/v1/zones?name={{ dns_zone }}"
    method: GET
    headers:
      Auth-Api-Token: "{{ dns_api_token }}"
    status_code: 200
  register: _hz_zone_resp
  when: dns_provider == "hetzner"

- name: "Hetzner: assert zone exists"
  ansible.builtin.assert:
    that: _hz_zone_resp.json.zones | length > 0
    fail_msg: "DNS zone '{{ dns_zone }}' not found in Hetzner account."
  when: dns_provider == "hetzner"

- name: "Hetzner: set zone ID"
  ansible.builtin.set_fact:
    _hz_zone_id: "{{ _hz_zone_resp.json.zones[0].id }}"
  when: dns_provider == "hetzner"

- name: "Hetzner: list existing records"
  ansible.builtin.uri:
    url: "https://dns.hetzner.com/api/v1/records?zone_id={{ _hz_zone_id }}"
    method: GET
    headers:
      Auth-Api-Token: "{{ dns_api_token }}"
    status_code: 200
  register: _hz_records_resp
  when: dns_provider == "hetzner"

- name: "Hetzner: find matching record"
  ansible.builtin.set_fact:
    _hz_existing: >-
      {{ _hz_records_resp.json.records
         | selectattr('type', 'equalto', record_type)
         | selectattr('name', 'equalto', _dns_relative)
         | list | first | default({}) }}
  when: dns_provider == "hetzner"

- name: "Hetzner: create DNS record {{ _dns_relative }}"
  ansible.builtin.uri:
    url: "https://dns.hetzner.com/api/v1/records"
    method: POST
    headers:
      Auth-Api-Token: "{{ dns_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      zone_id: "{{ _hz_zone_id }}"
      type: "{{ record_type }}"
      name: "{{ _dns_relative }}"
      value: "{{ record_value }}"
      ttl: "{{ dns_ttl | default(300) | int }}"
    status_code: 201
  register: _hz_create_resp
  when:
    - dns_provider == "hetzner"
    - _hz_existing.id is not defined

- name: "Hetzner: record exists, skipping – {{ _dns_relative }}"
  ansible.builtin.debug:
    msg: "{{ record_type }} {{ record_name }} already exists (id: {{ _hz_existing.id }})"
  when:
    - dns_provider == "hetzner"
    - _hz_existing.id is defined

# ── DNS State Tracking (optional) ────────────────────────────────────────────

- name: "DNS state: load state file"
  ansible.builtin.slurp:
    src: "{{ dns_state_file }}"
  register: _dns_state_raw
  failed_when: false
  when:
    - dns_state_file is defined
    - dns_provider == "hetzner"
    - _hz_existing.id is not defined
    - _hz_create_resp is defined

- name: "DNS state: parse existing records"
  ansible.builtin.set_fact:
    _dns_state_records: >-
      {{ (_dns_state_raw.content | default('') | b64decode | from_yaml | default({})).get('records', []) }}
  when:
    - dns_state_file is defined
    - dns_provider == "hetzner"
    - _hz_existing.id is not defined
    - _hz_create_resp is defined

- name: "DNS state: filter out duplicate entry"
  ansible.builtin.set_fact:
    _dns_state_base: >-
      {{ _dns_state_records | rejectattr('fqdn', 'equalto', record_name) | list
         + _dns_state_records | selectattr('fqdn', 'equalto', record_name)
           | rejectattr('type', 'equalto', record_type) | list }}
  when:
    - dns_state_file is defined
    - dns_provider == "hetzner"
    - _hz_existing.id is not defined
    - _dns_state_records is defined

- name: "DNS state: build new record entry"
  ansible.builtin.set_fact:
    _dns_state_entry:
      zone: "{{ dns_zone }}"
      type: "{{ record_type }}"
      name: "{{ _dns_relative }}"
      fqdn: "{{ record_name }}"
      value: "{{ record_value }}"
      provider: "{{ dns_provider }}"
      record_id: "{{ _hz_create_resp.json.record.id }}"
      module: "{{ dns_state_module | default('') }}"
  when:
    - dns_state_file is defined
    - dns_provider == "hetzner"
    - _hz_existing.id is not defined
    - _dns_state_base is defined

- name: "DNS state: write updated state file"
  ansible.builtin.copy:
    content: "{{ {'records': _dns_state_base + [_dns_state_entry]} | to_nice_yaml }}"
    dest: "{{ dns_state_file }}"
    mode: "0600"
  when:
    - dns_state_file is defined
    - dns_provider == "hetzner"
    - _hz_existing.id is not defined
    - _dns_state_entry is defined

# ── Cloudflare DNS (planned) ───────────────────────────────────────────────────

- name: "Cloudflare DNS not yet implemented"
  ansible.builtin.fail:
    msg: >-
      DNS provider 'cloudflare' is not yet implemented.
      Contribution welcome: playbooks/tasks/dns-create-record.yml
  when: dns_provider == "cloudflare"

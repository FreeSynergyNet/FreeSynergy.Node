---
# Task: Generate example config files for a single module instance
# Creates a config example showing all required variables

- name: "Ensure config directory exists for {{ instance_name }}"
  ansible.builtin.file:
    path: "{{ project_root }}/configs/{{ instance_name }}"
    state: directory
    mode: "0755"

- name: "Read module class file for example"
  ansible.builtin.include_vars:
    file: "{{ module_path }}/{{ module_entry.value.module_class | basename }}.yml"
    name: example_module_cfg

- name: "Generate config example for {{ instance_name }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/container.env.j2"
    dest: "{{ project_root }}/configs/{{ instance_name }}/{{ instance_name }}.example.env"
    mode: "0644"
  vars:
    tpl_environment: "{{ example_module_cfg.environment | default({}) }}"

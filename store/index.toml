# FreeSynergy.Node – Bundled Module Store Index (offline fallback)
# Live store: https://raw.githubusercontent.com/FreeSynergy/Store/main/Node/index.toml
#
# Field order (mandatory): id → name → service_type → version
#   → description → icon → website → repository → author → tags

# ── Proxy ─────────────────────────────────────────────────────────────────────

[[modules]]
id           = "proxy/zentinel"
name         = "Zentinel"
service_type = "proxy"
version      = "0.1.0"
description  = "Caddy-based reverse proxy with automatic TLS, DNS challenge support and KDL-driven config"
icon         = "modules/proxy/zentinel/zentinel.svg"
website      = "https://caddyserver.com"
repository   = "https://github.com/caddyserver/caddy"
author       = "FreeSynergy.Node"
tags         = ["proxy", "tls", "caddy", "acme"]


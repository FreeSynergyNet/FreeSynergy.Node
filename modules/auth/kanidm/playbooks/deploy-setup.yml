---
# Kanidm post-deploy setup
# Generates server.toml, then initializes admin accounts on first run

- name: "Generate server.toml from template"
  ansible.builtin.template:
    src: "{{ module_path }}/templates/kanidm.toml.j2"
    dest: "{{ module_vars.config_dir }}/data/server.toml"
    mode: "0644"

- name: "Ensure backup directory exists"
  ansible.builtin.file:
    path: "{{ module_vars.config_dir }}/data/backups"
    state: directory
    mode: "0755"

- name: "Wait for Kanidm to be ready"
  ansible.builtin.command:
    cmd: "podman exec {{ instance_name }} kanidmd healthcheck -c /data/server.toml"
  register: kanidm_health
  retries: 30
  delay: 2
  until: kanidm_health.rc == 0
  changed_when: false

- name: "Check if admin account needs initialization"
  ansible.builtin.stat:
    path: "{{ module_vars.config_dir }}/data/.initialized"
  register: kanidm_initialized

- name: "Initialize admin accounts"
  when: not kanidm_initialized.stat.exists
  block:
    - name: "Recover admin account"
      ansible.builtin.command:
        cmd: "podman exec {{ instance_name }} kanidmd recover-account admin"
      register: admin_recovery
      changed_when: true

    - name: "Recover idm_admin account"
      ansible.builtin.command:
        cmd: "podman exec {{ instance_name }} kanidmd recover-account idm_admin"
      register: idm_admin_recovery
      changed_when: true

    - name: "Save admin credentials"
      ansible.builtin.copy:
        content: |
          # Kanidm initial credentials – KEEP SECRET
          # Generated at {{ ansible_date_time.iso8601 }}
          admin: {{ admin_recovery.stdout }}
          idm_admin: {{ idm_admin_recovery.stdout }}
        dest: "{{ module_vars.config_dir }}/data/.admin-credentials"
        mode: "0600"

    - name: "Mark as initialized"
      ansible.builtin.file:
        path: "{{ module_vars.config_dir }}/data/.initialized"
        state: touch
        mode: "0644"

# ----------------------------------------------------------------
# OAuth2 client registration for all platform services
# Runs on every deploy to ensure clients exist
# ----------------------------------------------------------------

- name: "Register OAuth2 clients in Kanidm"
  ansible.builtin.command:
    cmd: >
      podman exec {{ instance_name }}
      kanidm system oauth2 create
      {{ item.client_id }}
      "{{ item.display_name }}"
      "{{ item.origin }}"
      --name idm_admin
  loop: "{{ kanidm_oauth2_clients | default([]) }}"
  register: oauth2_create
  failed_when: false
  changed_when: "'created' in oauth2_create.stdout | default('')"

- name: "Configure OAuth2 scope maps"
  ansible.builtin.command:
    cmd: >
      podman exec {{ instance_name }}
      kanidm system oauth2 update-scope-map
      {{ item.client_id }}
      {{ item.group | default('idm_all_accounts') }}
      openid email profile {{ item.extra_scopes | default('') }}
      --name idm_admin
  loop: "{{ kanidm_oauth2_clients | default([]) }}"
  failed_when: false
  changed_when: false

- name: "Configure prefer-short-username for clients"
  ansible.builtin.command:
    cmd: >
      podman exec {{ instance_name }}
      kanidm system oauth2 prefer-short-username
      {{ item.client_id }}
      --name idm_admin
  loop: "{{ kanidm_oauth2_clients | default([]) }}"
  when: item.prefer_short_username | default(true)
  failed_when: false
  changed_when: false

---
# Tuwunel post-deploy setup
# Generates tuwunel.toml config and waits for server readiness

- name: "Create Tuwunel data directory"
  ansible.builtin.file:
    path: "{{ module_vars.config_dir }}/data"
    state: directory
    mode: "0755"

- name: "Generate tuwunel.toml"
  ansible.builtin.template:
    src: "{{ module_path }}/templates/tuwunel.toml.j2"
    dest: "{{ module_vars.config_dir }}/data/tuwunel.toml"
    mode: "0644"

- name: "Wait for Tuwunel to be ready"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ module.port }}/_matrix/client/versions"
    return_content: false
    status_code: 200
  register: tuwunel_health
  retries: 30
  delay: 3
  until: tuwunel_health.status == 200
  failed_when: false

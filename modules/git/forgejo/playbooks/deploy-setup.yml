---
# Forgejo post-deploy setup
# Creates admin user and configures Kanidm OIDC authentication source

- name: "Wait for Forgejo to be ready"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ module.port }}/api/v1/version"
    return_content: false
    status_code: 200
  register: forgejo_health
  retries: 30
  delay: 2
  until: forgejo_health.status == 200

- name: "Check if admin account needs initialization"
  ansible.builtin.stat:
    path: "{{ module_vars.config_dir }}/data/.initialized"
  register: forgejo_initialized

- name: "Initialize Forgejo admin account"
  when: not forgejo_initialized.stat.exists
  block:
    - name: "Create admin user"
      ansible.builtin.command:
        cmd: >
          podman exec {{ instance_name }}
          forgejo admin user create
          --admin
          --username "{{ forgejo_admin_user | default('fsn-admin') }}"
          --password "{{ vault_forgejo_admin_password }}"
          --email "{{ forgejo_admin_email | default('admin@' + project_domain) }}"
          --must-change-password=false
      register: forgejo_admin_created
      changed_when: true

    - name: "Mark as initialized"
      ansible.builtin.file:
        path: "{{ module_vars.config_dir }}/data/.initialized"
        state: touch
        mode: "0644"

# OIDC authentication source (Kanidm)
# Only when kanidm service is available and not external-only

- name: "Check if OIDC auth source already exists"
  ansible.builtin.command:
    cmd: >
      podman exec {{ instance_name }}
      forgejo admin auth list
  register: forgejo_auth_sources
  changed_when: false

- name: "Configure Kanidm OIDC authentication source"
  when:
    - services.kanidm is defined
    - "'kanidm' not in forgejo_auth_sources.stdout"
  ansible.builtin.command:
    cmd: >
      podman exec {{ instance_name }}
      forgejo admin auth add-oauth
      --name "kanidm"
      --provider "openidConnect"
      --key "{{ vault_forgejo_oidc_client_id | default('forgejo') }}"
      --secret "{{ vault_forgejo_oidc_client_secret }}"
      --auto-discover-url "https://{{ services.kanidm.domain }}/oauth2/openid/forgejo/.well-known/openid-configuration"
      --scopes "openid email profile groups"
      --group-claim-name "groups"
      --admin-group "{{ forgejo_oidc_admin_group | default('') }}"
      --auto-register
  register: forgejo_oidc_configured

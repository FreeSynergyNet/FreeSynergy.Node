---
# Vikunja post-deploy setup

- name: "Create Vikunja directories"
  ansible.builtin.file:
    path: "{{ module_vars.config_dir }}/files"
    state: directory
    owner: "1000"
    mode: "0755"

- name: "Generate Vikunja config.yml"
  ansible.builtin.template:
    src: "{{ module_path }}/templates/config.yml.j2"
    dest: "{{ module_vars.config_dir }}/config.yml"
    mode: "0644"

- name: "Wait for Vikunja to be ready"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ module.port }}/api/v1/info"
    return_content: false
    status_code: 200
  register: vikunja_health
  retries: 30
  delay: 3
  until: vikunja_health.status == 200
  failed_when: false

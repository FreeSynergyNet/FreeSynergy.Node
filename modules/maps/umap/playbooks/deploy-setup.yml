---
# uMap post-deploy setup
# Creates directories, generates config, runs migrations

- name: "Create uMap directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ module_vars.config_dir }}/uploads"
    - "{{ module_vars.config_dir }}/static"

- name: "Generate umap.conf"
  ansible.builtin.template:
    src: "{{ module_path }}/templates/umap.conf.j2"
    dest: "{{ module_vars.config_dir }}/umap.conf"
    mode: "0644"

- name: "Run uMap migrations"
  ansible.builtin.command:
    cmd: "podman exec {{ instance_name }} umap migrate"
  register: umap_migrate
  changed_when: "'Applying' in umap_migrate.stdout"

- name: "Collect static files"
  ansible.builtin.command:
    cmd: "podman exec {{ instance_name }} umap collectstatic --noinput"
  changed_when: false

- name: "Wait for uMap to be ready"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ module.port }}/"
    return_content: false
    status_code: 200
  register: umap_health
  retries: 20
  delay: 3
  until: umap_health.status == 200
  failed_when: false

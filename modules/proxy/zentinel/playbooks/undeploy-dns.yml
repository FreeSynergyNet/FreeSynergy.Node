---
# Zentinel DNS cleanup
# Removes A/AAAA/CNAME records for all services on this host

- name: "Remove A records for each service"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/dns-remove-record.yml"
  loop: "{{ project_services }}"
  loop_control:
    loop_var: service
  vars:
    record_type: "A"
    record_name: "{{ service.subdomain }}.{{ project_domain }}"
    dns_zone: "{{ project_domain }}"
    dns_provider: "{{ dns_provider }}"
    dns_api_token: "{{ dns_api_token }}"
    dns_state_file: "{{ inventory_dir }}/../projects/{{ project_name }}/.dns-managed.yml"

- name: "Remove AAAA records for each service"
  when: host_ipv6 is defined and host_ipv6 | length > 0
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/dns-remove-record.yml"
  loop: "{{ project_services }}"
  loop_control:
    loop_var: service
  vars:
    record_type: "AAAA"
    record_name: "{{ service.subdomain }}.{{ project_domain }}"
    dns_zone: "{{ project_domain }}"
    dns_provider: "{{ dns_provider }}"
    dns_api_token: "{{ dns_api_token }}"
    dns_state_file: "{{ inventory_dir }}/../projects/{{ project_name }}/.dns-managed.yml"

- name: "Remove CNAME records for aliases"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/dns-remove-record.yml"
  loop: "{{ project_services | selectattr('aliases', 'defined') | map(attribute='aliases') | flatten }}"
  loop_control:
    loop_var: alias
  vars:
    record_type: "CNAME"
    record_name: "{{ alias.name }}.{{ project_domain }}"
    dns_zone: "{{ project_domain }}"
    dns_provider: "{{ dns_provider }}"
    dns_api_token: "{{ dns_api_token }}"
    dns_state_file: "{{ inventory_dir }}/../projects/{{ project_name }}/.dns-managed.yml"

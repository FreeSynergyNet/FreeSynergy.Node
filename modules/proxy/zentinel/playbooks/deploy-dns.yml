---
# Zentinel DNS deploy
# Creates A/AAAA/CNAME records for all services on this host.
# Reconciles stale records: if a service was renamed since the last deploy,
# the old DNS record is deleted before the new one is created.

- name: "Collect all services on this host"
  ansible.builtin.set_fact:
    all_services: "{{ all_services | default([]) + [item] }}"
  loop: "{{ project_services }}"

# ── Reconcile: remove stale DNS records ───────────────────────────────────────

- name: "DNS reconcile: set state file path"
  ansible.builtin.set_fact:
    _dns_state_path: "{{ inventory_dir }}/../projects/{{ project_name }}/.dns-managed.yml"

- name: "DNS reconcile: load state file"
  ansible.builtin.slurp:
    src: "{{ _dns_state_path }}"
  register: _rec_raw
  failed_when: false

- name: "DNS reconcile: parse state and zentinel records"
  ansible.builtin.set_fact:
    _rec_all: >-
      {{ (_rec_raw.content | default('') | b64decode | from_yaml | default({})).get('records', []) }}
    _rec_zentinel: >-
      {{ (_rec_raw.content | default('') | b64decode | from_yaml | default({})).get('records', [])
         | selectattr('module', 'equalto', 'proxy/zentinel') | list }}

- name: "DNS reconcile: build expected FQDN list"
  ansible.builtin.set_fact:
    _rec_expected: >-
      {{ all_services | map(attribute='subdomain')
         | map('regex_replace', '$', '.' + project_domain) | list
         + (all_services | selectattr('aliases', 'defined')
            | map(attribute='aliases') | flatten
            | map(attribute='name')
            | map('regex_replace', '$', '.' + project_domain) | list) }}

- name: "DNS reconcile: find stale records"
  ansible.builtin.set_fact:
    _rec_stale: >-
      {{ _rec_zentinel | rejectattr('fqdn', 'in', _rec_expected) | list }}

- name: "Hetzner: delete stale DNS record"
  ansible.builtin.uri:
    url: "https://dns.hetzner.com/api/v1/records/{{ stale.record_id }}"
    method: DELETE
    headers:
      Auth-Api-Token: "{{ dns_api_token }}"
    status_code: [200, 204, 404]
  loop: "{{ _rec_stale }}"
  loop_control:
    loop_var: stale
    label: "{{ stale.type }} {{ stale.fqdn }}"
  when:
    - dns_provider == "hetzner"
    - _rec_stale | length > 0

- name: "DNS reconcile: update state file after cleanup"
  ansible.builtin.copy:
    content: >-
      {{ {'records':
            _rec_all | rejectattr('module', 'equalto', 'proxy/zentinel') | list
            + _rec_zentinel | selectattr('fqdn', 'in', _rec_expected) | list
         } | to_nice_yaml }}
    dest: "{{ _dns_state_path }}"
    mode: "0600"
  when: _rec_stale | length > 0

# ── Create records ────────────────────────────────────────────────────────────

- name: "Create A records for each service"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/dns-create-record.yml"
  loop: "{{ all_services }}"
  loop_control:
    loop_var: service
  vars:
    record_type: "A"
    record_name: "{{ service.subdomain }}.{{ project_domain }}"
    record_value: "{{ host_ip }}"
    dns_zone: "{{ project_domain }}"
    dns_provider: "{{ dns_provider }}"
    dns_api_token: "{{ dns_api_token }}"
    dns_ttl: "{{ dns_ttl | default(300) }}"
    dns_state_file: "{{ inventory_dir }}/../projects/{{ project_name }}/.dns-managed.yml"
    dns_state_module: "proxy/zentinel"

- name: "Create AAAA records for each service"
  when: host_ipv6 is defined and host_ipv6 | length > 0
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/dns-create-record.yml"
  loop: "{{ all_services }}"
  loop_control:
    loop_var: service
  vars:
    record_type: "AAAA"
    record_name: "{{ service.subdomain }}.{{ project_domain }}"
    record_value: "{{ host_ipv6 }}"
    dns_zone: "{{ project_domain }}"
    dns_provider: "{{ dns_provider }}"
    dns_api_token: "{{ dns_api_token }}"
    dns_ttl: "{{ dns_ttl | default(300) }}"
    dns_state_file: "{{ inventory_dir }}/../projects/{{ project_name }}/.dns-managed.yml"
    dns_state_module: "proxy/zentinel"

- name: "Create CNAME records for aliases"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/dns-create-record.yml"
  loop: "{{ all_services | selectattr('aliases', 'defined') | map(attribute='aliases') | flatten }}"
  loop_control:
    loop_var: alias
  vars:
    record_type: "CNAME"
    record_name: "{{ alias.name }}.{{ project_domain }}"
    record_value: "{{ alias.target }}.{{ project_domain }}"
    dns_zone: "{{ project_domain }}"
    dns_provider: "{{ dns_provider }}"
    dns_api_token: "{{ dns_api_token }}"
    dns_ttl: "{{ dns_ttl | default(300) }}"
    dns_state_file: "{{ inventory_dir }}/../projects/{{ project_name }}/.dns-managed.yml"
    dns_state_module: "proxy/zentinel"

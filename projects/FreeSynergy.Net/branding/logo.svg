<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- FSN Logo: Three interconnected nodes forming a network -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5c3a"/>
      <stop offset="100%" stop-color="#2d8a5e"/>
    </linearGradient>
  </defs>

  <!-- Network symbol: three connected circles -->
  <g transform="translate(8, 10)">
    <!-- Connections -->
    <line x1="12" y1="8" x2="28" y2="32" stroke="#1a5c3a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="28" y1="32" x2="38" y2="10" stroke="#1a5c3a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="12" y1="8" x2="38" y2="10" stroke="#1a5c3a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Nodes -->
    <circle cx="12" cy="8" r="6" fill="url(#g1)"/>
    <circle cx="28" cy="32" r="6" fill="url(#g1)"/>
    <circle cx="38" cy="10" r="6" fill="#d4a843"/>
  </g>

  <!-- Text -->
  <text x="62" y="28" font-family="'Fraunces', Georgia, serif" font-size="20" font-weight="600" fill="#1a5c3a" letter-spacing="-0.02em">
    Free
  </text>
  <text x="62" y="50" font-family="'Fraunces', Georgia, serif" font-size="20" font-weight="800" fill="#1a5c3a" letter-spacing="-0.02em">
    Synergy<tspan fill="#d4a843" font-weight="400">.Net</tspan>
  </text>
</svg>

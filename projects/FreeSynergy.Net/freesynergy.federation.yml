---
federation:
  name: "FreeSynergy Federation"
  signing_key: "{{ vault_federation_signing_key }}"

  provider_list:
    source: "https://federation.freesynergy.net/providers.yml"
    verify_key: ""
    auto_update: true
    update_interval: 3600
    fallback: local

  trusted_issuers: []
